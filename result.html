<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Extraction Suite - Active</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; text-align: center; margin: 0; }
        .console { border: 2px solid #ff0000; padding: 25px; background: #050505; min-height: 500px; box-shadow: 0 0 30px red; max-width: 650px; margin: 20px auto; text-align: left; }
        .line { margin: 25px 0; font-size: 18px; border-bottom: 1px solid #111; padding-bottom: 10px; }
        .label { color: red; font-weight: bold; }
        #map-box { display: none; margin-top: 25px; border: 3px solid #00ff00; height: 450px; width: 100%; border-radius: 10px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="console">
        <h2 style="text-align:center; color: #ff0000;">[نظام التعقب الجنائي - سحب حي]</h2>
        
        <div class="line"><span class="label">الجهاز المكتشف:</span> <span id="device">جاري الفحص...</span></div>
        <div class="line"><span class="label">عنوان IP المستهدف:</span> <span id="ip">بانتظار الإشارة...</span></div>
        <div class="line"><span class="label">مزود الخدمة (ISP):</span> <span id="isp">تحليل الشبكة...</span></div>
        
        <div id="map-box">
            <iframe id="googleMap" src=""></iframe>
        </div>
    </div>

    <script>
        window.onload = function() {
            startExtraction();
        };

        function startExtraction() {
            const finalIP = "130.193.246.163";
            const ispName = "Allay Nawroz Telecom Company/Ltd.";
            const devices = ["iPhone 15 Pro", "Samsung S24 Ultra", "Infinix Hot 40", "INFINIX"];

            // 1. فحص الأجهزة
            let d = 0;
            let dInt = setInterval(() => {
                document.getElementById('device').innerText = devices[d % devices.length];
                d++;
                if(d > 15) {
                    clearInterval(dInt);
                    document.getElementById('device').innerText = "INFINIX (DETECTED)";
                    document.getElementById('device').style.color = "white";
                    
                    // 2. فحص الـ IP
                    let i = 0;
                    let ipInt = setInterval(() => {
                        document.getElementById('ip').innerText = finalIP.substring(0, i) + Math.floor(Math.random()*10);
                        i++;
                        if(i > finalIP.length) {
                            clearInterval(ipInt);
                            document.getElementById('ip').innerText = finalIP;
                            document.getElementById('ip').style.color = "white";
                            
                            // 3. المزود
                            document.getElementById('isp').innerText = ispName;
                            document.getElementById('isp').style.color = "white";
                            
                            // 4. إظهار الخريطة بالإحداثيات مالتك
                            showMap();
                        }
                    }, 100);
                }
            }, 150);
        }

        function showMap() {
            document.getElementById('map-box').style.display = 'block';
            
            // الإحداثيات اللي دزيتها أنت (أربيل)
            const lat = 36.1898056;
            const lon = 44.0156944;
            
            // رابط الخريطة Satellite مع زووم عالي (z=19)
            const mapUrl = `https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d500!2d${lon}!3d${lat}!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sar!2siq!4v123456789&layer=s`;
            
            document.getElementById('googleMap').src = mapUrl;
        }
    </script>
</body>
</html>
