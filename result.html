<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري سحب البيانات...</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; }
        .terminal { border: 1px solid #ff0000; padding: 20px; background: #050505; min-height: 500px; box-shadow: 0 0 20px red; max-width: 600px; margin: auto; }
        .line { margin: 20px 0; font-size: 18px; }
        .label { color: red; font-weight: bold; }
        #map-box { display: none; margin-top: 20px; border: 2px solid #00ff00; height: 400px; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2 style="text-align:center;">[نظام التعقب الجنائي المباشر]</h2>
        <div class="line"><span class="label">الجهاز:</span> <span id="device">بانتظار الإشارة...</span></div>
        <div class="line"><span class="label">IP:</span> <span id="ip">...</span></div>
        <div class="line"><span class="label">المزود:</span> <span id="isp">...</span></div>
        
        <div id="map-box">
            <iframe id="map" width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </div>

    <script>
        // دالة تبدأ البحث فوراً
        window.onload = function() {
            startExtraction();
        };

        function startExtraction() {
            const finalIP = "130.193.246.163";
            const devices = ["iPhone 15", "Samsung S24", "Infinix Hot 40", "INFINIX"];
            
            // 1. الأجهزة
            let d = 0;
            let dInt = setInterval(() => {
                document.getElementById('device').innerText = devices[d % devices.length];
                d++;
                if(d > 20) {
                    clearInterval(dInt);
                    document.getElementById('device').innerText = "INFINIX (DETECTED)";
                    
                    // 2. الـ IP
                    let i = 0;
                    let ipInt = setInterval(() => {
                        document.getElementById('ip').innerText = finalIP.substring(0, i) + "X";
                        i++;
                        if(i > finalIP.length) {
                            clearInterval(ipInt);
                            document.getElementById('ip').innerText = finalIP;
                            
                            // 3. المزود والخريطة
                            document.getElementById('isp').innerText = "Allay Nawroz Telecom Company/Ltd.";
                            showMap();
                        }
                    }, 100);
                }
            }, 150);
        }

        function showMap() {
            document.getElementById('map-box').style.display = 'block';
            document.getElementById('map').src = "https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3334.2!2d44.3661!3d33.3152!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sar!2siq!4v123456789&layer=s";
        }
    </script>
</body>
</html>
