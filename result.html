<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Extracting Data...</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 20px; }
        .console { border: 1px solid #ff0000; padding: 20px; background: #050505; min-height: 500px; box-shadow: 0 0 20px red; }
        .line { margin: 20px 0; font-size: 18px; }
        .label { color: red; font-weight: bold; }
        #map-box { display: none; margin-top: 30px; border: 2px solid #00ff00; height: 400px; }
    </style>
</head>
<body>
    <div class="console">
        <h2>[نظام التعقب الجنائي - جاري السحب]</h2>
        <div class="line"><span class="label">الجهاز:</span> <span id="device">بانتظار التحليل...</span></div>
        <div class="line"><span class="label">عنوان IP:</span> <span id="ip">...</span></div>
        <div class="line"><span class="label">مزود الخدمة:</span> <span id="isp">...</span></div>
        
        <div id="map-box">
            <iframe id="googleMap" width="100%" height="100%" frameborder="0" src=""></iframe>
        </div>
    </div>

    <script>
        // هنا تبدأ العملية فور فتح الصفحة
        window.onload = function() {
            // 1. بحث الأجهزة (تطول)
            let devices = ["Apple iPhone", "Samsung S24", "Xiaomi", "INFINIX"];
            let d = 0;
            let dInt = setInterval(() => {
                document.getElementById('device').innerText = devices[d % devices.length];
                d++;
                if(d > 40) { // تقدر تزيد هذا الرقم ليطول أكثر
                    clearInterval(dInt);
                    document.getElementById('device').innerText = "INFINIX (DETECTED)";
                    startIP();
                }
            }, 200);
        }

        function startIP() {
            let targetIP = "130.193.246.163";
            let i = 0;
            let ipInt = setInterval(() => {
                document.getElementById('ip').innerText = targetIP.substring(0, i) + Math.floor(Math.random()*10);
                if(Math.random() > 0.8) i++;
                if(i > targetIP.length) {
                    clearInterval(ipInt);
                    document.getElementById('ip').innerText = targetIP;
                    startISP();
                }
            }, 150);
        }

        function startISP() {
            let ispName = "Allay Nawroz Telecom Company for Communication/Ltd.";
            let k = 0;
            let ispInt = setInterval(() => {
                document.getElementById('isp').innerText = ispName.substring(0, k);
                k++;
                if(k > ispName.length) {
                    clearInterval(ispInt);
                    showMap();
                }
            }, 100);
        }

        function showMap() {
            document.getElementById('map-box').style.display = 'block';
            // إحداثيات الموقع اللي ردته
            document.getElementById('googleMap').src = "https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d13338.483!2d44.3661!3d33.3152!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sar!2siq!4v123456789";
        }
    </script>
</body>
</html>
