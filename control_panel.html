<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المركزية</title>
    <style>
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
        }
        .container {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #ff0000;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px #ff0000;
            display: inline-block;
            width: 95%;
            max-width: 500px;
        }
        h1 { color: #ff0000; font-size: 22px; text-shadow: 0 0 10px #ff0000; }
        
        /* تحسين عرض الصورة لتظهر كاملة */
        .image-box {
            width: 100%;
            background: #111;
            border: 1px solid #00ff00;
            margin: 20px 0;
            line-height: 0;
        }
        .image-box img {
            width: 100%;
            height: auto; /* يضمن بقاء الصورة كاملة حسب أبعادها الأصلية */
            display: block;
        }

        .btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        #status { display: none; margin-top: 15px; color: #fff; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚠️ تم رصد صفحة فيسبوك نشطة</h1>

        <div class="image-box">
            <img src="https://raw.githubusercontent.com/jgdshsdfhbhdbcx248-droid/o7f46/main/photo_5197298453145390054_y.jpg" alt="Target Image">
        </div>

        <button class="btn" onclick="start()">جلب جميع المعلومات</button>

        <div id="status">
            [SYSTEM]: Extracting data... <span id="p">0%</span>
        </div>
    </div>

    <script>
        function start() {
            document.getElementById('status').style.display = 'block';
            let p = 0;
            let i = setInterval(() => {
                p += 2;
                document.getElementById('p').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(i);
                    alert('تم جلب البيانات بنجاح إلى الفلاشة المتصلة');
                }
            }, 50);
        }
    </script>

</body>
</html>
