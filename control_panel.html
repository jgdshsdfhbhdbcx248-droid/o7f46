<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TARGET ACQUIRED - FACEBOOK</title>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .header-text { font-size: 24px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 15px #ff0000; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .frame { border: 3px solid #ff0000; padding: 10px; position: relative; box-shadow: 0 0 30px #ff0000; background: rgba(20, 0, 0, 0.8); }
        
        /* تعديل لعرض الصورة بشكل صحيح */
        img { max-width: 300px; max-height: 400px; display: block; filter: contrast(1.1) brightness(1.1); }
        
        .scanning-line { position: absolute; width: 100%; height: 3px; background: #ff0000; top: 0; left: 0; animation: scan 2.5s linear infinite; box-shadow: 0 0 15px #ff0000; z-index: 5; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .status-box { margin-top: 25px; text-align: center; font-size: 14px; color: #ff0000; border: 1px solid #ff0000; padding: 10px; background: rgba(50, 0, 0, 0.3); width: 300px; }
        .btn-extract { background: #ff0000; color: #000; border: none; padding: 18px 35px; margin-top: 25px; cursor: pointer; font-weight: bold; font-family: 'Courier New'; font-size: 18px; transition: 0.3s; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .btn-extract:hover { background: #fff; color: #ff0000; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="header-text">تم العثور على صفحة فيس بوك</div>

    <div class="frame">
        <div class="scanning-line"></div>
        <img src="photo_5197298453145390038_y.jpg" alt="TARGET_DATA">
    </div>

    <div class="status-box">
        [ STATUS: TARGET CONFIRMED ]<br>
        [ ACCESSING PRIVATE DATA... ]
    </div>

    <button class="btn-extract" onclick="window.location.href='result.html'">سحب معلومات صاحب هذه الصفحة</button>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#f00"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random() * 128), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
