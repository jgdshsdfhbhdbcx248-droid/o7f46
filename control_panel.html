<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Control Panel</title>
    <style>
        body { background: #000; color: #00ff00; text-align: center; font-family: sans-serif; padding-top: 30px; }
        .box { border: 2px solid #ff0000; display: inline-block; padding: 20px; border-radius: 15px; background: #050505; max-width: 90%; }
        img { width: 100%; max-height: 400px; border: 1px solid #333; margin-bottom: 20px; }
        .btn-link { 
            background: #00ff00; color: #000; padding: 20px; text-decoration: none;
            display: block; font-weight: bold; font-size: 22px; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:red">النظام جاهز للاختراق</h2>
        <img src="photo_5197298453145390054_y.jpg">
        <a href="result.html" class="btn-link">جلب جميع المعلومات</a>
    </div>
</body>
</html>
