<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>Control Panel - Secure Access</title>
    <style>

        #analysis-section { display: none; text-align: left; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .data-line { font-size: 16px; margin: 15px 0; padding: 10px; background: #050505; border-right: 3px solid #ff0000; }
        .label { color: #ff0000; font-weight: bold; margin-left: 5px; }
        
        .btn-fetch { background: #00ff00; color: #000; padding: 18px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 20px; border: none; }
        
        #map-container { display: none; margin-top: 20px; border: 2px solid #00ff00; height: 300px; width: 100%; }
        .loader { color: #fff; font-size: 14px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    </div>
</div>
