<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - تم الاختراق</title>
    <style>
        /* الألوان والخلفية */
        body { 
            background-color: #000; 
            color: #00ff00; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px;
        }

        /* حاوية المحتوى الرئيسي */
        .main-container {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #ff0000;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px #ff0000;
            display: inline-block;
            width: 95%;
            max-width: 500px;
            margin-top: 20px;
        }

        h1 { 
            color: #ff0000; 
            font-size: 24px; 
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 20px;
        }

        /* مربع الصورة - جعلناه مرن ليعرض الصورة كاملة */
        .image-viewer {
            width: 100%;
            min-height: 300px;
            background: #111;
            border: 1px dashed #00ff00;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .image-viewer img {
            max-width: 100%;
            max-height: 500px; /* طول مناسب لعرض الصورة كاملة */
            object-fit: contain; /* هذا يمنع قص أي جزء من الصورة */
            display: block;
        }

        .status-info {
            background: #002200;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #00ff00;
        }

        /* الزر الكبير */
        .action-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:hover {
            background: #00cc00;
            box-shadow: 0 0 15px #00ff00;
        }

        #loading-text {
            display: none;
            margin-top: 15px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>⚠️ تم رصد صفحة فيسبوك نشطة</h1>

        <div class="status-info">
            الحالة: تم فك تشفير الجلسة بنجاح<br>
            المصدر: Database_Server_Alpha
        </div>

        <div class="image-viewer">
            <img src="photo_5197298453145390054_y.jpg" alt="Target Data Image">
        </div>

        <button class="action-btn" onclick="startExtraction()">جلب جميع المعلومات</button>

        <div id="loading-text">
            [SYSTEM]: Scanning folders...<br>
            [SYSTEM]: Exporting to Flash Drive...<br>
            <span id="percent">0%</span>
        </div>
    </div>

    <script>
        function startExtraction() {
            document.querySelector('.action-btn').innerHTML = "جاري السحب...";
            document.getElementById('loading-text').style.display = 'block';
            let p = 0;
            let interval = setInterval(() => {
                p += 1;
                document.getElementById('percent').innerText = "التقدم: " + p + "%";
                if (p >= 100) {
                    clearInterval(interval);
                    alert('تم سحب كافة البيانات بنجاح إلى الفلاشة المتصلة');
                    document.querySelector('.action-btn').innerHTML = "تم الجلب بنجاح ✅";
                }
            }, 50);
        }
    </script>

</body>
</html>
