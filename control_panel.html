<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 20px; }
        .box { background: #050505; border: 2px solid #ff0000; padding: 20px; border-radius: 15px; display: inline-block; width: 95%; max-width: 500px; box-shadow: 0 0 25px #ff0000; }
        .img-target { width: 100%; max-height: 300px; object-fit: contain; border: 1px solid #333; margin-bottom: 20px; background: #000; }
        
        #analysis-section { display: none; text-align: left; margin-top: 15px; }
        .data-line { font-size: 15px; margin: 10px 0; padding: 10px; background: #111; border-right: 4px solid #ff0000; }
        .label { color: #ff0000; font-weight: bold; }
        
        /* الدقمة سويتها كبيرة وواضحة جداً */
        .btn-fetch { 
            background: #00ff00; color: #000; padding: 20px; width: 100%; 
            font-weight: bold; cursor: pointer; border-radius: 10px; 
            font-size: 22px; border: 4px solid #fff; display: block;
        }
        #map-container { display: none; margin-top: 20px; border: 2px solid #00ff00; height: 300px; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="top-title">النظام جاهز للاختراق</h2>
    
    <img src="https://raw.githubusercontent.com/jgdshsdfhbhdbcx248-droid/o7f46/main/photo_5197298453145390054_y.jpg" class="img-target">

    <button type="button" class="btn-fetch" id="mainBtn" onclick="runHack()">جلب جميع المعلومات</button>

    <div id="analysis-section">
        <div class="data-line"><span class="label">[الجهاز]:</span> <span id="device">...</span></div>
        <div class="data-line"><span class="label">[IP]:</span> <span id="ip">...</span></div>
        <div class="data-line"><span class="label">[المزود]:</span> <span id="isp">...</span></div>
    </div>

    <div id="map-container">
        <iframe id="googleMap" width="100%" height="100%" frameborder="0" style="border:0"></iframe>
    </div>
</div>

<script>
    // هذه الوظيفة ستعمل فور الضغط
    function runHack() {
        console.log("Button Clicked!"); // للتأكد في المتصفح
        
        // إخفاء الزر وإظهار النتائج
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('analysis-section').style.display = 'block';
        document.getElementById('top-title').innerText = "جاري السحب الفوري...";

        // بدلا من 30 دقيقة، خليتها سريعة للتجربة هسة
        let devices = ["iPhone", "Samsung", "Nokia", "INFINIX"];
        let i = 0;
        let devInterval = setInterval(() => {
            document.getElementById('device').innerText = devices[i % devices.length];
            i++;
            if(i > 20) {
                clearInterval(devInterval);
                document.getElementById('device').innerText = "INFINIX (MATCHED)";
                startIP();
            }
        }, 100);
    }

    function startIP() {
        let fullIP = "130.193.246.163";
        let current = "";
        let j = 0;
        let ipInterval = setInterval(() => {
            document.getElementById('ip').innerText = fullIP.substring(0, j) + Math.floor(Math.random()*10);
            if(Math.random() > 0.7) j++;
            if(j > fullIP.length) {
                clearInterval(ipInterval);
                document.getElementById('ip').innerText = fullIP;
                startISP();
            }
        }, 80);
    }

    function startISP() {
        let name = "Allay Nawroz Telecom Company for Communication/Ltd.";
        let k = 0;
        let ispInterval = setInterval(() => {
            document.getElementById('isp').innerText = name.substring(0, k);
            k++;
            if(k > name.length) {
                clearInterval(ispInterval);
                showFinalMap();
            }
        }, 50);
    }
