<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Control Panel</title>
    <style>
        body { background: #000; color: #00ff00; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background: #0a0a0a; border: 2px solid #ff0000; padding: 30px; display: inline-block; border-radius: 15px; box-shadow: 0 0 20px #ff0000; width: 350px; position: relative; }
        h2 { color: #ff0000; }
        .img-box { width: 200px; height: 200px; border: 1px solid #00ff00; margin: 20px auto; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        img { width: 100%; height: auto; }
        .btn { background: #00ff00; color: #000; padding: 15px; border: none; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .logout { position: absolute; top: 10px; left: 10px; background: #333; color: #fff; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <button class="logout" onclick="location.href='index.html'">خروج ✖</button>
        <h2>⚠️ تم اختراق الفيسبوك</h2>
        <div class="img-box">
            <img src="رابط_صورتك" alt="Target">
        </div>
        <button class="btn" onclick="alert('جاري سحب البيانات للفلاشة...')">جلب المعلومات</button>
    </div>
</body>
</html>
