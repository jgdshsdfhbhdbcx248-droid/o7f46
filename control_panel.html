<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TARGET ACQUIRED</title>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .target-frame { position: relative; display: inline-block; border: 2px solid #ff0000; padding: 10px; box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        .target-frame::before, .target-frame::after { content: ""; position: absolute; width: 40px; height: 40px; border: 4px solid #ff0000; }
        .target-frame::before { top: -10px; left: -10px; border-right: 0; border-bottom: 0; }
        .target-frame::after { bottom: -10px; right: -10px; border-left: 0; border-top: 0; }
        
        img { max-width: 500px; filter: contrast(1.2) brightness(0.9) sepia(0.3); }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(255,0,0,0.8); animation: scan 3s infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        
        .status { margin-top: 20px; font-size: 20px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn-next { background: transparent; border: 1px solid #ff0000; color: #ff0000; padding: 15px 30px; margin-top: 30px; cursor: pointer; font-weight: bold; }
        .btn-next:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 5px;">[ TARGET_CONFIRMED ]</h2>
    
    <div class="target-frame">
        <div class="scan-line"></div>
        <img src="your_image.jpg" alt="Target Image">
    </div>

    <div class="status">ANALYZING BIOMETRIC DATA... 88%</div>
    
    <br>
    <button class="btn-next" onclick="window.location.href='result.html'">PROCEED TO EXTRACTION</button>

</body>
</html>
