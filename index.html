<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ACCESS - PRIVATE</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { border: 1px solid #0f0; padding: 40px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 20px #0f0; text-align: center; width: 350px; }
        .typing { font-size: 20px; font-weight: bold; margin-bottom: 20px; border-right: 2px solid #0f0; white-space: nowrap; overflow: hidden; width: 0; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 100%; margin-bottom: 20px; outline: none; text-align: center; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #008800; }
    </style>
</head>
<body>

    <div class="login-box">
        <div id="welcome-text" class="typing"></div>
        <input type="password" placeholder="ENTER ACCESS CODE" id="pin">
        <button onclick="checkPin()">INITIALIZE SESSION</button>
    </div>

    <script>
        const text = "Welcome Back Mr. Ali...";
        let i = 0;

        // وظيفة الكتابة والترحيب الصوتي
        window.onload = function() {
            // نطق الجملة
            let msg = new SpeechSynthesisUtterance("Welcome Back Mister Ali");
            msg.lang = 'en-US';
            msg.rate = 0.8; 
            window.speechSynthesis.speak(msg);

            // تأثير الكتابة
            function type() {
                if (i < text.length) {
                    document.getElementById("welcome-text").innerHTML += text.charAt(i);
                    document.getElementById("welcome-text").style.width = "auto";
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        };

        function checkPin() {
            if(document.getElementById('pin').value === "1234") { // غير الرمز هنا
                window.location.href = "image_page.html";
            } else {
                alert("ACCESS DENIED - UNAUTHORIZED ATTEMPT");
            }
        }
    </script>
</body>
</html>
