<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <title>System Access</title>
    <style>
        body {
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Tajawal', sans-serif; /* الخط العربي المرتب */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }

        /* خلفية خفيفة تعطي شكل تقني */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.2;
            z-index: -1;
        }

        .content {
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }

        h1 {
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            font-family: 'JetBrains Mono', monospace; /* خط الأرقام المرتب */
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff; /* أزرق احترافي */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="content">
    <h1>مرحباً بك أستاذ علي</h1>
    <p>يرجى إدخال رمز التحقق للدخول</p>
    <input type="password" id="passwordInput" placeholder="••••••••">
    <button onclick="checkPassword()">دخول النظام</button>
    <div id="errorMessage" class="error-message"></div>
</div>

<script>
    const correctPassword = "05195688";
    function checkPassword() {
        const enteredPassword = document.getElementById('passwordInput').value;
        if (enteredPassword === correctPassword) {
            window.location.href = "control_panel.html";
        } else {
            document.getElementById('errorMessage').innerText = "الرمز غير صحيح، حاول مجدداً";
        }
    }
</script>

</body>
</html>
