<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Changa:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0a0a0a;
            /* استعملنا خط Cairo لأنه يدعم المتصفحات القديمة والجديدة بوضوح عالي */
            font-family: 'Cairo', sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }

        .login-card {
            background: #141414;
            padding: 40px;
            border-radius: 15px;
            border: 1px solid #222;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
            text-align: center;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-family: 'Changa', sans-serif; /* خط أعرض وأفخم للعناوين */
            font-weight: 700;
            font-size: 28px;
            margin-bottom: 10px;
            color: #007bff;
        }

        p {
            font-size: 15px;
            color: #aaa;
            margin-bottom: 30px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #050505;
            color: #00ff00; /* لون الرمز أخضر للتمويه */
            font-size: 22px;
            text-align: center;
            letter-spacing: 5px; /* تباعد النجوم لجمالية أكثر */
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
        }

        .error {
            color: #ff3333;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>مرحباً بك أستاذ علي</h1>
    <p>النظام يتطلب رمز الوصول للمتابعة</p>
    <input type="password" id="pass" placeholder="••••••••">
    <button onclick="login()">دخول النظام</button>
    <div id="msg" class="error"></div>
</div>

<script>
    function login() {
        const p = document.getElementById('pass').value;
        if (p === "05195688") {
            window.location.href = "control_panel.html";
        } else {
            document.getElementById('msg').innerText = "الرمز غير صحيح.. تم تسجيل المحاولة";
        }
    }
</script>

</body>
</html>
