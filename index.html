<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>نظام الوصول الآمن</title>
    
    <style>
        body {
            background-color: #050505;
            /* استخدمنا خطوط ويندوز الأصلية لضمان الوضوح والترتيب */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .login-box {
            background: #111;
            padding: 50px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center;
            width: 400px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #0084ff; /* أزرق ملكي */
            font-weight: bold;
        }

        p {
            color: #777;
            font-size: 16px;
            margin-bottom: 30px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            background: #000;
            border: 1px solid #444;
            border-radius: 10px;
            color: #00ff00;
            font-size: 24px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        input[type="password"]:focus {
            border-color: #0084ff;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0066cc;
        }

        .error {
            color: #ff4444;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>مرحباً بك أستاذ علي</h1>
    <p>أدخل رمز الدخول للمتابعة</p>
    <input type="password" id="passCode" placeholder="••••••••">
    <button onclick="validate()">دخول النظام</button>
    <div id="errorMsg" class="error"></div>
</div>

<script>
    function validate() {
        const val = document.getElementById('passCode').value;
        if (val === "05195688") {
            // إضافة رقم عشوائي للرابط لإجبار المتصفح على فتح الصفحة الجديدة
            window.location.href = "control_panel.html?v=" + Math.random();
        } else {
            document.getElementById('errorMsg').innerText = "الرمز غير صحيح.. تم تسجيل المحاولة";
        }
    }
</script>

</body>
</html>
