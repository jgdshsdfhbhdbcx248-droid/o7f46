<!DOCTYPE html>
<html>
<head>
<title>System Access</title>
<style>
  body {
    background-color: black;
    color: limegreen; /* لون أخضر للنصوص */
    font-family: 'Courier New', monospace; /* خط يشبه شاشات الهاكرز */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh; /* يملأ الشاشة بالكامل */
    margin: 0;
    overflow: hidden; /* لمنع ظهور شريط التمرير */
    position: relative;
  }
  .background-image {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('YOUR_IMAGE_URL_HERE'); /* هنا حط رابط الصورة اللي تختارها */
    background-size: cover;
    background-position: center;
    opacity: 0.15; /* شفافية الصورة الخلفية */
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1; /* لجعل المحتوى فوق الصورة */
    background: rgba(0, 0, 0, 0.7); /* خلفية سوداء شفافة للمحتوى */
    padding: 30px 50px;
    border: 1px solid limegreen; /* إطار أخضر */
    box-shadow: 0 0 15px limegreen; /* ظل أخضر */
    border-radius: 5px;
    text-align: center;
  }
  h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
    color: white; /* لون أبيض للعنوان */
    text-shadow: 0 0 10px limegreen;
  }
  p {
    font-size: 1.2em;
    margin-bottom: 30px;
  }
  input[type="password"] {
    background: #0d0d0d;
    color: limegreen;
    border: 1px solid limegreen;
    padding: 10px 15px;
    font-size: 1.1em;
    outline: none;
    width: 250px;
    margin-bottom: 20px;
    text-align: center;
  }
  button {
    background: limegreen;
    color: black;
    border: none;
    padding: 12px 25px;
    font-size: 1.2em;
    cursor: pointer;
    border-radius: 3px;
    transition: background 0.3s ease;
  }
  button:hover {
    background: #00ff00;
  }
  .error-message {
    color: red;
    margin-top: 15px;
    font-size: 1em;
  }
</style>
</head>
<body>
  <div class="background-image"></div>
  <div class="content">
    <h1>مرحباً بك أستاذ علي من جديد</h1>
    <p>أدخل الرمز للوصول إلى لوحة التحكم:</p>
    <input type="password" id="passwordInput" placeholder="أدخل الرمز السري">
    <button onclick="checkPassword()">دخول</button>
    <div id="errorMessage" class="error-message"></div>
  </div>

<script>
  const correctPassword = "05195688"; // الرمز السري الصحيح
  function checkPassword() {
    const enteredPassword = document.getElementById('passwordInput').value;
    if (enteredPassword === correctPassword) {
      window.location.href = "control_panel.html"; // سيتم توجيه المستخدم إلى هذه الصفحة بعد الدخول
    } else {
      document.getElementById('errorMessage').innerText = "رمز خاطئ. حاول مرة أخرى.";
    }
  }
</script>
</body>
</html>
