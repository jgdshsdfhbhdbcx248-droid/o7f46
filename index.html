<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ACCESS - VECTOR SYSTEM</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* تأثير الماتريكس بالخلفية */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        /* الكوكب المشفر على اليمين */
        .cyber-planet {
            position: absolute; right: -100px; top: 20%; width: 400px; height: 400px;
            border: 1px dashed #0f0; border-radius: 50%; opacity: 0.6;
            animation: rotatePlanet 20s linear infinite; z-index: 1;
        }
        .cyber-planet::before {
            content: "101011010010101101010101101010101010101";
            position: absolute; top: 50%; left: 50%; color: #0f0; font-size: 10px;
            transform: translate(-50%, -50%); word-break: break-all; width: 80%; text-align: center;
        }
        @keyframes rotatePlanet { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* حاوية تسجيل الدخول */
        .login-box { 
            border: 2px solid #0f0; padding: 50px; background: rgba(0, 15, 0, 0.9); 
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3); text-align: center; 
            width: 380px; z-index: 10; border-radius: 5px; position: relative;
        }
        
        .typing { font-size: 22px; font-weight: bold; margin-bottom: 25px; color: #fff; text-shadow: 0 0 10px #0f0; }
        
        input { 
            background: rgba(0,0,0,0.5); border: 1px solid #0f0; color: #fff; 
            padding: 15px; width: 100%; margin-bottom: 25px; outline: none; 
            text-align: center; font-size: 20px; letter-spacing: 5px; box-sizing: border-box;
        }
        
        button { 
            background: transparent; border: 1px solid #0f0; color: #0f0; 
            padding: 15px; cursor: pointer; font-weight: bold; width: 100%; 
            font-size: 16px; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #0f0; color: #000; box-shadow: 0 0 20px #0f0; }

        .system-status { font-size: 10px; color: #004400; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div class="cyber-planet"></div>

    <div class="login-box">
        <div id="welcome-text" class="typing"></div>
        <input type="password" placeholder="DECRYPT KEY" id="pin" maxlength="8">
        <button onclick="checkAccess()">AUTHORIZE ACCESS</button>
        <div class="system-status">
            > NODE: SECURE_V3<br>
            > ENCRYPTION: ACTIVE<br>
            > LOCATION: HIDDEN
        </div>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random() * 128), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // Typing Effect
        const text = "Welcome Back Mr. Ali...";
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("welcome-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 80);
            }
        }
        window.onload = typeWriter;

        // Login Logic
        function checkAccess() {
            const pin = document.getElementById('pin').value;
            if(pin === "05195688") {
                window.location.href = "image_page.html";
            } else {
                alert("ACCESS DENIED: INVALID DECRYPTION KEY");
                document.getElementById('pin').value = "";
            }
        }
    </script>
</body>
</html>
