<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Facebook Intercept - Admin Panel</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .panel {
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #ff0000; /* إطار أحمر للتحذير */
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            width: 80%;
            max-width: 500px;
        }

        h1 {
            color: #ff0000;
            font-size: 28px;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 20px;
        }

        .fb-image {
            width: 250px;
            height: auto;
            border: 2px solid #00ff00;
            margin: 20px 0;
            border-radius: 10px;
            box-shadow: 0 0 15px #00ff00;
        }

        .status-text {
            font-size: 18px;
            margin: 15px 0;
            color: #fff;
        }

        .fetch-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 20px;
        }

        .fetch-btn:hover {
            background: #cc0000;
            box-shadow: 0 0 20px #ff0000;
        }

        /* تأثير العداد الوهمي */
        #loading {
            display: none;
            margin-top: 20px;
            font-family: monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="panel">
        <h1>⚠️ تم رصد صفحة فيسبوك نشطة</h1>
        
        <p class="status-text">Target Device: iPhone 15 Pro Max</p>

        <img src="رابط_الصورة_هنا" alt="Facebook Target" class="fb-image">

        <div class="status-text" style="color: #00ff00;">الحالة: تم اختراق الجلسة (Session Hijacked)</div>

        <button class="fetch-btn" onclick="startFetch()">جلب جميع المعلومات</button>

        <div id="loading">
            [SYSTEM]: Accessing Database...<br>
            [SYSTEM]: Extracting Messages...<br>
            [SYSTEM]: Downloading Private Media...<br>
            <span id="percent">0%</span>
        </div>
    </div>

    <script>
        function startFetch() {
            document.querySelector('.fetch-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            let p = 0;
            let interval = setInterval(() => {
                p += Math.floor(Math.random() * 5) + 1;
                if (p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    alert('تم جلب جميع البيانات بنجاح.. الملفات الآن في الفلاشة');
                }
                document.getElementById('percent').innerText = "PROGRESS: " + p + "%";
            }, 200);
        }
    </script>
</body>
</html>
