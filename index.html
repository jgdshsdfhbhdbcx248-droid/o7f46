<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>System Access Panel</title>
    
    <style>
        body {
            background-color: #000000; /* خلفية سوداء بالكامل */
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #00ff00; /* لون أخضر فسفوري */
        }

        .login-box {
            background: #050505;
            padding: 40px;
            border-radius: 10px;
            border: 2px solid #00ff00; /* إطار أخضر */
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            text-align: center;
            width: 380px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-weight: bold;
        }

        p {
            color: #008800; /* أخضر غامق */
            font-size: 14px;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 5px;
            color: #00ff00;
            font-size: 24px;
            text-align: center;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00cc00;
            box-shadow: 0 0 15px #00ff00;
        }

        .error {
            color: #ff0000;
            margin-top: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        /* إضافة لمسة تقنية بسيطة */
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.1);
            position: absolute;
            top: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <div class="login-box">
        <h1>نظام الوصول المشفر</h1>
        <p>مرحباً بك أستاذ علي.. أدخل الرمز</p>
        <input type="password" id="pass" placeholder="••••••••">
        <button onclick="check()">دخول النظام</button>
        <div id="err" class="error"></div>
    </div>

<script>
    function check() {
        if(document.getElementById('pass').value === "05195688") {
            window.location.href = "control_panel.html?v=" + Date.now();
        } else {
            document.getElementById('err').innerText = "خطأ في التوثيق.. تم إرسال إشعار للمسؤول";
        }
    }
</script>
</body>
</html>
