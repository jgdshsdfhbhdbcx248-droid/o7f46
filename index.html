<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>System Access Matrix</title>
    <style>
        /* إعدادات الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* حاوية الشفرات المتحركة (الخلفية) */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* واجهة تسجيل الدخول (فوق الشفرات) */
        .login-container {
            position: relative;
            z-index: 10; /* لجعلها فوق الماتريكس */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.85); /* خلفية سوداء شفافة */
            padding: 40px;
            border: 2px solid #00ff00;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px #00ff00;
            width: 350px;
        }

        h1 {
            color: #00ff00;
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }

        button:hover {
            background: #008800;
            color: #fff;
        }

        .error { color: red; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="login-container">
        <div class="login-box">
            <h1>نظام الاختراق العالمي</h1>
            <p style="color: #00ff00; font-size: 12px;">مرحباً أستاذ علي.. أدخل رمز فك التشفير</p>
            <input type="password" id="pass" placeholder="••••••••">
            <button onclick="check()">دخول النظام</button>
            <div id="err" class="error"></div>
        </div>
    </div>

    <script>
        // كود تشغيل مطر الماتريكس
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%'\"#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00ff00";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(draw, 33);

        function check() {
            if(document.getElementById('pass').value === "05195688") {
                window.location.href = "control_panel.html";
            } else {
                document.getElementById('err').innerText = "تم رصد محاولة دخول غير مصرح بها!";
            }
        }
        </script>
</body>
</html>
