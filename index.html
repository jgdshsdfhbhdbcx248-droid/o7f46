<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Control Panel - Secure Access</title>
    <style>
        body {
            background-color: #000;
            color: #00ff00;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .panel {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ff00;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px #00ff00;
            width: 400px;
            position: relative;
        }

        /* زر تسجيل الخروج */
        .logout-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #444;
            color: #fff;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 5px;
        }

        h1 { font-size: 24px; color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        .fb-image {
            width: 200px;
            height: 200px;
            border: 1px solid #00ff00;
            margin: 20px 0;
            background: #111; /* مكان الصورة إذا ما حطيت رابط */
        }

        .fetch-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
        }

        #loading-screen { display: none; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

    <div class="panel">
        <button class="logout-btn" onclick="location.href='index.html'">تسجيل الخروج ✖</button>
        
        <h1>⚠️ تم اختراق قاعدة بيانات فيسبوك</h1>
        <p style="color: #aaa;">الحالة: الاتصال مستقر (Encrypted)</p>

        <img src="رابط_صورتك" alt="Facebook Data" class="fb-image">

        <button class="fetch-btn" onclick="start()">جلب جميع المعلومات</button>

        <div id="loading-screen">
            <p>جارٍ سحب الصور... <span id="proc">0%</span></p>
        </div>
    </div>

    <script>
        function start() {
            document.querySelector('.fetch-btn').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'block';
            let p = 0;
            let i = setInterval(() => {
                p += 2;
                document.getElementById('proc').innerText = p + "%";
                if(p >= 100) {
                    clearInterval(i);
                    alert('تم سحب كافة البيانات بنجاح إلى السيرفر الرئيسي');
                }
            }, 100);
        }
    </script>
</body>
</html>
