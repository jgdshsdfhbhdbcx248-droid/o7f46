<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL ACCESS</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }

        /* الكوكب المشفر على اليمين */
        .cyber-planet {
            position: absolute; right: -150px; top: 15%; width: 450px; height: 450px;
            border: 1px dashed #0f0; border-radius: 50%; opacity: 0.5;
            animation: rotatePlanet 25s linear infinite; z-index: 1;
        }
        .cyber-planet::after {
            content: "0110100101110101010110110101010110101010110101";
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70%; text-align: center; font-size: 12px; color: #0f0; word-break: break-all;
        }
        @keyframes rotatePlanet { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .login-box { 
            border: 2px solid #0f0; padding: 45px; background: rgba(0, 10, 0, 0.95); 
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.3); text-align: center; 
            width: 360px; z-index: 10; border-radius: 8px;
        }
        .typing { font-size: 22px; font-weight: bold; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px #0f0; min-height: 1.2em; }
        input { 
            background: transparent; border: 1px solid #0f0; color: #fff; 
            padding: 15px; width: 100%; margin-bottom: 25px; outline: none; 
            text-align: center; font-size: 20px; box-sizing: border-box;
        }
        button { 
            background: #0f0; color: #000; border: none; padding: 15px; 
            cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #ff0000; color: #fff; box-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="cyber-planet"></div>
    <div class="login-box">
        <div id="welcome-text" class="typing"></div>
        <input type="password" placeholder="ENTER PIN" id="pin">
        <button onclick="checkAccess()">AUTHORIZE ACCESS</button>
    </div>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random() * 128), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // Typing Effect
        const text = "Welcome Back Mr. Ali...";
        let i = 0;
        function type() {
            if (i < text.length) {
                document.getElementById("welcome-text").innerHTML += text.charAt(i);
                i++; setTimeout(type, 100);
            }
        }
        window.onload = type;

        // Login Logic
        function checkAccess() {
            const pin = document.getElementById('pin').value;
            if(pin === "05195688") {
                // الربط مع الملف الموجود عندك فعلياً
                window.location.href = "control_panel.html";
            } else {
                alert("ACCESS DENIED");
            }
        }
    </script>
</body>
</html>
